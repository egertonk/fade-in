<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Draw It! — Pictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#ffc94d; --green:#46e08a; --magenta:#ff4d7d; --cyan:#46d6e0; --cream:#f6f0e2;
  --muted:rgba(246,240,226,.6); --line:rgba(246,240,226,.13); --panel:#171226;
  --bg:#0f0b1c;
  --display:"Bricolage Grotesque",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100vh;overflow:hidden;}
body{
  background:radial-gradient(1200px 800px at 80% -10%, #241a3d 0%, var(--bg) 60%);
  color:var(--cream);
  font-family:var(--body);
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ---------- brand ---------- */
.brand{
  position:fixed; top:14px; left:16px; z-index:60;
  font-family:var(--display); font-weight:800; font-size:20px;
  display:flex; align-items:center; gap:10px; letter-spacing:.2px;
  pointer-events:none;
}
.brand a{
  pointer-events:auto;
  font-family:var(--mono); font-weight:400; font-size:11px; text-transform:uppercase;
  letter-spacing:.5px; text-decoration:none; color:var(--muted);
  border:1px solid var(--line); border-radius:999px; padding:5px 10px;
  transition:.15s; background:rgba(0,0,0,.15);
}
.brand a:hover{ color:var(--cream); border-color:rgba(246,240,226,.35); }

/* ---------- generic buttons ---------- */
button{ font-family:var(--display); font-weight:800; cursor:pointer; border:none; }
.btn{
  font-family:var(--display); font-weight:800; font-size:16px;
  border-radius:13px; padding:12px 20px; border:1px solid transparent;
  transition:.15s transform, .15s background, .15s border-color; line-height:1;
}
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:var(--gold); color:#241802; }
.btn-primary:hover{ background:#ffd570; }
.btn-ghost{ background:transparent; color:var(--cream); border:1px solid var(--line); }
.btn-ghost:hover{ border-color:rgba(246,240,226,.4); }
.btn-sm{ font-size:13px; padding:9px 14px; border-radius:11px; }

.label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--muted); }

/* ---------- chips ---------- */
.chips{ display:flex; flex-wrap:wrap; gap:10px; }
.chip{
  font-family:var(--display); font-weight:800; font-size:15px;
  background:transparent; color:var(--cream);
  border:1px solid var(--line); border-radius:999px; padding:10px 18px; transition:.15s;
}
.chip:hover{ border-color:rgba(246,240,226,.4); }
.chip[aria-pressed="true"]{ background:var(--cream); color:#1a1330; border-color:var(--cream); }

/* ---------- screens ---------- */
.screen{ position:fixed; inset:0; display:none; }
.screen.active{ display:flex; }

/* setup */
#setup{ align-items:center; justify-content:center; padding:24px; }
.setup-card{
  width:min(560px,94vw); background:var(--panel); border:1px solid var(--line);
  border-radius:22px; padding:34px 32px; box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.setup-card h1{ font-family:var(--display); font-weight:800; font-size:clamp(30px,5vw,44px); margin:2px 0 6px; }
.setup-card .sub{ color:var(--muted); font-size:15px; margin:0 0 26px; line-height:1.5; max-width:44ch; }
.field{ margin-bottom:22px; }
.field > .label{ display:block; margin-bottom:10px; }
#startBtn{ width:100%; font-size:19px; padding:16px; margin-top:8px; }

/* ---------- play ---------- */
#play{ flex-direction:column; }
.topbar{
  position:relative; z-index:20;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:10px 14px 10px 190px;
  background:rgba(15,11,28,.9); border-bottom:1px solid var(--line);
  backdrop-filter:blur(6px);
}
.tools{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.divider{ width:1px; align-self:stretch; background:var(--line); margin:0 4px; }

.swatch{
  width:30px; height:30px; border-radius:9px; padding:0; border:2px solid rgba(255,255,255,.25);
  transition:.12s;
}
.swatch[aria-pressed="true"]{ outline:2px solid var(--cream); outline-offset:2px; transform:scale(1.06); }

.sizebtn{
  width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.06);
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center; padding:0;
}
.sizebtn[aria-pressed="true"]{ background:var(--cream); border-color:var(--cream); }
.sizedot{ background:#1a1330; border-radius:50%; display:block; }
.sizebtn:not([aria-pressed="true"]) .sizedot{ background:var(--cream); }

.spacer{ flex:1 1 auto; }

.timerbox{
  font-family:var(--mono); font-weight:700; font-size:20px; letter-spacing:1px;
  background:rgba(255,255,255,.06); border:1px solid var(--line);
  border-radius:11px; padding:7px 14px; min-width:74px; text-align:center;
}
.timerbox.warn{ color:var(--magenta); border-color:rgba(255,77,125,.5); }
.timerbox.hidden{ display:none; }

.canvas-wrap{ position:relative; flex:1 1 auto; min-height:0; background:#f7f5ef; }
#board{ position:absolute; inset:0; width:100%; height:100%; touch-action:none; display:block; cursor:crosshair; }

/* word banner during reveal */
.wordbanner{
  position:absolute; left:50%; bottom:22px; transform:translateX(-50%);
  z-index:15; display:none; align-items:center; gap:14px;
  background:rgba(15,11,28,.92); border:1px solid var(--line);
  border-radius:16px; padding:14px 26px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  max-width:92vw;
}
.wordbanner.show{ display:flex; }
.wordbanner .label{ margin:0; }
.wordbanner .word{ font-family:var(--display); font-weight:800; font-size:clamp(26px,5vw,52px); color:var(--gold); text-transform:capitalize; }
.wordbanner.time .word{ color:var(--magenta); }

.timeflash{
  position:absolute; inset:0; z-index:14; display:none; align-items:center; justify-content:center;
  font-family:var(--display); font-weight:800; font-size:clamp(50px,14vw,150px);
  color:var(--magenta); text-shadow:0 4px 30px rgba(255,77,125,.4);
  pointer-events:none;
}
.timeflash.show{ display:flex; animation:flashpulse .5s ease-in-out 3; }
@keyframes flashpulse{ 0%,100%{opacity:1;} 50%{opacity:.15;} }

/* ---------- cover (look away) ---------- */
#cover{ align-items:center; justify-content:center; padding:24px;
  background:radial-gradient(900px 600px at 50% 0%, #2a1e47 0%, var(--bg) 65%);
  z-index:50; text-align:center; flex-direction:column;
}
#cover .look{ font-family:var(--display); font-weight:800; font-size:clamp(28px,6vw,54px); margin:0; }
#cover .drawer{ font-family:var(--mono); text-transform:uppercase; letter-spacing:2px; color:var(--gold); font-size:14px; margin:14px 0 30px; }
.peekbtn{
  font-family:var(--display); font-weight:800; font-size:22px;
  background:var(--panel); color:var(--cream);
  border:2px dashed rgba(246,240,226,.35); border-radius:20px;
  padding:34px 44px; min-width:min(440px,90vw); transition:.12s;
  display:flex; flex-direction:column; align-items:center; gap:8px; justify-content:center;
  min-height:150px;
}
.peekbtn:active{ transform:scale(.99); }
.peekbtn .hint{ font-family:var(--mono); font-weight:400; font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
.peekbtn.revealed{ border-style:solid; border-color:var(--gold); background:#1f1836; }
.peekbtn .secret{ font-size:clamp(34px,8vw,72px); color:var(--gold); text-transform:capitalize; line-height:1; }
.peekbtn .diff-tag{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
.cover-actions{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:28px; }
</style>
</head>
<body>

<div class="brand">✏️ Draw It! <a href="../">← All games</a></div>

<!-- ================= SETUP ================= -->
<section id="setup" class="screen active">
  <div class="setup-card">
    <h1>Draw It!</h1>
    <p class="sub">Secret-word Pictionary for remote teams. Share your screen. The drawer peeks while everyone else looks away, then draws — the team shouts guesses.</p>

    <div class="field">
      <span class="label">Difficulty</span>
      <div class="chips" id="diffChips">
        <button class="chip" data-diff="easy" aria-pressed="true">Easy</button>
        <button class="chip" data-diff="medium" aria-pressed="false">Medium</button>
        <button class="chip" data-diff="hard" aria-pressed="false">Hard</button>
      </div>
    </div>

    <div class="field">
      <span class="label">Timer</span>
      <div class="chips" id="timerChips">
        <button class="chip" data-time="60" aria-pressed="false">60s</button>
        <button class="chip" data-time="90" aria-pressed="true">90s</button>
        <button class="chip" data-time="120" aria-pressed="false">120s</button>
        <button class="chip" data-time="0" aria-pressed="false">Off</button>
      </div>
    </div>

    <button id="startBtn" class="btn btn-primary">Start</button>
  </div>
</section>

<!-- ================= PLAY ================= -->
<section id="play" class="screen">
  <div class="topbar">
    <div class="tools">
      <div id="swatches" class="tools" style="gap:6px;"></div>
      <div class="divider"></div>
      <div id="sizes" class="tools" style="gap:6px;"></div>
      <div class="divider"></div>
      <button id="eraserBtn" class="btn btn-ghost btn-sm">🧽 Eraser</button>
      <button id="undoBtn" class="btn btn-ghost btn-sm">↶ Undo</button>
      <button id="clearBtn" class="btn btn-ghost btn-sm">Clear</button>
    </div>
    <div class="spacer"></div>
    <div id="timerBox" class="timerbox">0:90</div>
    <button id="revealBtn" class="btn btn-ghost btn-sm">👁 Reveal word</button>
    <button id="newWordBtn" class="btn btn-primary btn-sm">New word →</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="board"></canvas>
    <div id="timeFlash" class="timeflash">⏰ Time!</div>
    <div id="wordBanner" class="wordbanner">
      <span class="label" id="wordBannerLabel">The word was</span>
      <span class="word" id="wordBannerText">—</span>
    </div>
  </div>
</section>

<!-- ================= COVER (look away) ================= -->
<section id="cover" class="screen">
  <p class="look">🙈 Everyone look away!</p>
  <p class="drawer">Drawer only</p>

  <button id="peekBtn" class="peekbtn">
    <span class="secret" id="secretWord">?</span>
    <span class="hint" id="peekHint">Press &amp; hold to see your word</span>
    <span class="diff-tag" id="diffTag">easy</span>
  </button>

  <div class="cover-actions">
    <button id="diffWordBtn" class="btn btn-ghost">🎲 Different word</button>
    <button id="startDrawBtn" class="btn btn-primary">Start drawing ▶</button>
  </div>
</section>

<script>
"use strict";

/* ---------------- word lists ---------------- */
const WORDS = {
  easy: ["cat","dog","house","sun","tree","car","fish","apple","star","boat",
    "hat","book","ball","cup","key","door","clock","chair","table","shoe",
    "bird","flower","cloud","moon","snake","bee","cake","pizza","banana","egg",
    "umbrella","glasses","balloon","kite","phone","spoon","fork","socks","bed","lamp",
    "heart","smile","rainbow","ladder","bridge","train","bus","pencil","ring","drum"],
  medium: ["lighthouse","volcano","dragon","octopus","robot","castle","dinosaur","windmill","telescope","backpack",
    "sandwich","penguin","waterfall","campfire","snowman","hamburger","skateboard","guitar","helicopter","cactus",
    "mushroom","scarecrow","treehouse","spider web","toothbrush","fire truck","hot air balloon","picnic","igloo","anchor",
    "compass","microscope","waffle","peacock","koala","jellyfish","hammock","fountain","tornado","hedgehog",
    "wheelbarrow","typewriter","lantern","chandelier","seahorse","pinwheel","trophy","violin","kangaroo","satellite"],
  hard: ["procrastination","gravity","déjà vu","teamwork","recycling","photosynthesis","hibernation","deadline","brainstorm","evaporation",
    "eavesdropping","claustrophobia","time travel","magnetism","echo","camouflage","stampede","avalanche","mirage","quicksand",
    "hourglass","metamorphosis","constellation","boomerang","escalator","kaleidoscope","turbulence","origami","acupuncture","hypnosis",
    "juggling","tightrope","ventriloquist","archaeology","fingerprint","spontaneous","allergy","gossip","nostalgia","freedom",
    "electricity","reflection","shadow puppet","stethoscope","conveyor belt","seismograph","weathervane","paradox","checkmate","overtime"]
};

/* ---------------- state ---------------- */
const state = {
  difficulty:"easy",
  timer:90,
  word:"",
  remaining:0,
  tickId:null,
  running:false
};

const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}

/* ---------------- setup chips ---------------- */
function wireChipGroup(containerId, attr, onPick){
  const c = $(containerId);
  c.addEventListener("click",(e)=>{
    const b = e.target.closest(".chip"); if(!b) return;
    [...c.querySelectorAll(".chip")].forEach(x=>x.setAttribute("aria-pressed", x===b ? "true":"false"));
    onPick(b.getAttribute(attr));
  });
}
wireChipGroup("diffChips","data-diff",(v)=>{ state.difficulty = v; });
wireChipGroup("timerChips","data-time",(v)=>{ state.timer = parseInt(v,10); });

$("startBtn").addEventListener("click", ()=>{ pickNewWord(); openCover(); });

/* ---------------- word picking ---------------- */
function pickNewWord(){
  const list = WORDS[state.difficulty] || WORDS.easy;
  let w;
  do { w = list[Math.floor(Math.random()*list.length)]; } while(w===state.word && list.length>1);
  state.word = w;
  renderSecret();
}
function renderSecret(){
  $("diffTag").textContent = state.difficulty;
  $("secretWord").textContent = "?"; // hidden until peek
}

/* ---------------- cover (look away) ---------------- */
function openCover(){
  stopTimer();
  hideReveal();
  $("peekBtn").classList.remove("revealed");
  $("secretWord").textContent = "?";
  $("peekHint").textContent = "Press & hold to see your word";
  showScreen("cover");
}

const peekBtn = $("peekBtn");
function peekShow(e){
  if(e) e.preventDefault();
  peekBtn.classList.add("revealed");
  $("secretWord").textContent = state.word;
  $("peekHint").textContent = "release to hide";
}
function peekHide(){
  peekBtn.classList.remove("revealed");
  $("secretWord").textContent = "?";
  $("peekHint").textContent = "Press & hold to see your word";
}
peekBtn.addEventListener("pointerdown", peekShow);
peekBtn.addEventListener("pointerup", peekHide);
peekBtn.addEventListener("pointerleave", peekHide);
peekBtn.addEventListener("pointercancel", peekHide);
peekBtn.addEventListener("touchstart", peekShow, {passive:false});
peekBtn.addEventListener("touchend", peekHide);
peekBtn.addEventListener("contextmenu", e=>e.preventDefault());

$("diffWordBtn").addEventListener("click", ()=>{
  pickNewWord();
  // keep it hidden after swap
  peekHide();
});

$("startDrawBtn").addEventListener("click", ()=>{
  showScreen("play");
  resizeCanvas();
  clearBoard(false);
  hideReveal();
  startTimer();
});

/* ================= DRAWING ================= */
const canvas = $("board");
const ctx = canvas.getContext("2d");
let dpr = 1;
let cssW = 0, cssH = 0;

let drawing = false;
let curColor = "#1a1330";
let curSize = 6;
let eraser = false;
let lastPt = null;

// stroke history for undo. Each stroke = {color,size,eraser,points:[{x,y}]}
let strokes = [];
let current = null;

function resizeCanvas(){
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  cssW = rect.width; cssH = rect.height;
  dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}

function clearBoard(keepStrokes){
  if(!keepStrokes) strokes = [];
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}

function drawStroke(s){
  const pts = s.points;
  if(!pts.length) return;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = s.eraser ? "#ffffff" : s.color;
  ctx.lineWidth = s.size;
  if(pts.length === 1){
    // dot
    ctx.beginPath();
    ctx.fillStyle = s.eraser ? "#ffffff" : s.color;
    ctx.arc(pts[0].x, pts[0].y, s.size/2, 0, Math.PI*2);
    ctx.fill();
    return;
  }
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=1;i<pts.length;i++){ ctx.lineTo(pts[i].x, pts[i].y); }
  ctx.stroke();
}

function redraw(){
  clearBoard(true);
  for(const s of strokes) drawStroke(s);
}

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener("pointerdown",(e)=>{
  if($("play").classList.contains("active")===false) return;
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  drawing = true;
  const p = getPos(e);
  current = { color:curColor, size:curSize, eraser:eraser, points:[p] };
  strokes.push(current);
  lastPt = p;
  // draw initial dot immediately
  drawStroke(current);
});

canvas.addEventListener("pointermove",(e)=>{
  if(!drawing || !current) return;
  e.preventDefault();
  // coalesced events for smoother lines
  const events = (e.getCoalescedEvents ? e.getCoalescedEvents() : null);
  const list = (events && events.length) ? events : [e];
  ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.strokeStyle = current.eraser ? "#ffffff" : current.color;
  ctx.lineWidth = current.size;
  for(const ev of list){
    const p = getPos(ev);
    ctx.beginPath();
    ctx.moveTo(lastPt.x, lastPt.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    current.points.push(p);
    lastPt = p;
  }
});

function endStroke(e){
  if(!drawing) return;
  drawing = false;
  current = null;
  lastPt = null;
}
canvas.addEventListener("pointerup", endStroke);
canvas.addEventListener("pointercancel", endStroke);
canvas.addEventListener("pointerleave", endStroke);

/* ---------------- toolbar build ---------------- */
const COLORS = ["#1a1330","#ff4d7d","#ffc94d","#46e08a","#46d6e0","#8a5cff"];
const swatchWrap = $("swatches");
COLORS.forEach((col,i)=>{
  const b = document.createElement("button");
  b.className = "swatch";
  b.style.background = col;
  b.setAttribute("aria-pressed", i===0 ? "true":"false");
  b.setAttribute("aria-label","color");
  b.addEventListener("click", ()=>{
    curColor = col; eraser = false;
    [...swatchWrap.children].forEach(s=>s.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    setEraserVisual(false);
  });
  swatchWrap.appendChild(b);
});

const SIZES = [3,6,14];
const sizeWrap = $("sizes");
SIZES.forEach((sz,i)=>{
  const b = document.createElement("button");
  b.className = "sizebtn";
  b.setAttribute("aria-pressed", sz===curSize ? "true":"false");
  b.setAttribute("aria-label","brush size "+sz);
  const dot = document.createElement("span");
  dot.className = "sizedot";
  const d = Math.min(20, sz+4);
  dot.style.width = d+"px"; dot.style.height = d+"px";
  b.appendChild(dot);
  b.addEventListener("click", ()=>{
    curSize = sz;
    [...sizeWrap.children].forEach(s=>s.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
  });
  sizeWrap.appendChild(b);
});

function setEraserVisual(on){
  const btn = $("eraserBtn");
  if(on){ btn.classList.remove("btn-ghost"); btn.classList.add("btn-primary"); }
  else { btn.classList.add("btn-ghost"); btn.classList.remove("btn-primary"); }
}
$("eraserBtn").addEventListener("click", ()=>{
  eraser = !eraser;
  setEraserVisual(eraser);
  if(eraser){ [...swatchWrap.children].forEach(s=>s.setAttribute("aria-pressed","false")); }
});

$("undoBtn").addEventListener("click", ()=>{
  if(strokes.length){ strokes.pop(); redraw(); }
});
$("clearBtn").addEventListener("click", ()=>{ clearBoard(false); });

/* ---------------- timer ---------------- */
function fmt(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return m + ":" + String(s).padStart(2,"0");
}
function startTimer(){
  stopTimer();
  const box = $("timerBox");
  if(!state.timer || state.timer<=0){
    box.classList.add("hidden");
    state.running = false;
    return;
  }
  box.classList.remove("hidden","warn");
  state.remaining = state.timer;
  state.running = true;
  box.textContent = fmt(state.remaining);
  state.tickId = setInterval(()=>{
    state.remaining--;
    if(state.remaining<=10) box.classList.add("warn");
    box.textContent = fmt(Math.max(0,state.remaining));
    if(state.remaining<=0){
      stopTimer();
      timesUp();
    }
  },1000);
}
function stopTimer(){
  if(state.tickId){ clearInterval(state.tickId); state.tickId=null; }
  state.running = false;
}

function timesUp(){
  const flash = $("timeFlash");
  flash.classList.add("show");
  setTimeout(()=>flash.classList.remove("show"), 1600);
  revealWord(true);
}

/* ---------------- reveal ---------------- */
function revealWord(fromTimer){
  const b = $("wordBanner");
  $("wordBannerLabel").textContent = fromTimer ? "⏰ Time! The word was" : "The word was";
  $("wordBannerText").textContent = state.word;
  b.classList.toggle("time", !!fromTimer);
  b.classList.add("show");
}
function hideReveal(){
  $("wordBanner").classList.remove("show","time");
  $("timeFlash").classList.remove("show");
}

$("revealBtn").addEventListener("click", ()=>{
  stopTimer();
  revealWord(false);
});
$("newWordBtn").addEventListener("click", ()=>{
  stopTimer();
  pickNewWord();
  openCover();
});

/* ---------------- resize ---------------- */
let resizeRaf = null;
window.addEventListener("resize", ()=>{
  if($("play").classList.contains("active")===false) return;
  if(resizeRaf) cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(resizeCanvas);
});

// prevent whole-page scroll/zoom gestures on touch
document.addEventListener("gesturestart", e=>e.preventDefault());
</script>
</body>
</html>
